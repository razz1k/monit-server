groups:
  - name: systemd-alerts
    rules:
      - alert: SystemdServiceFailed
        expr: systemd_unit_state{state="failed", type="service"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "systemd service failed: {{ $labels.name }} on {{ $labels.instance }}"
          description: "Unit {{ $labels.name }} is in failed state on {{ $labels.instance }}."
